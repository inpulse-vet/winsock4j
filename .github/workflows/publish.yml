name: Publish to Maven Central

on:
  release:
    types: [published]

# Least privilege: publishing goes to Maven Central, not back to the repo.
permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # Gate the publishing secrets behind an environment so they can be protected with
    # required reviewers and tag restrictions (configure in Settings -> Environments).
    environment: maven-central
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Publish release to Maven Central
        env:
          VERSION: ${{ github.event.release.tag_name }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew publishToMavenCentral --no-configuration-cache
