name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    # ws2_32 downcalls only resolve on Windows, so the test suite must run on a Windows host.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Build and test
        # Exclude the "integration" tag: startup() connects to real Bluetooth hardware.
        run: .\gradlew.bat build --no-daemon -PexcludeTags=integration
